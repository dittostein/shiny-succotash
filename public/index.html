<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>aADTest market</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #111318;
      --muted: #5b616e;
      --brand: #1f6feb; /* soft azure */
      --border: #e6e8ec;
      --cold: #e9ecf1; /* colder tone for ad payment */
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans", Arial, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    /* Header */
    .site-header { position: sticky; top: 0; z-index: 20; background: #fff; border-bottom: 1px solid var(--border); }
    .container { max-width: 1100px; margin: 0 auto; padding: 12px 16px; }
    .brand { font-weight: 800; letter-spacing: 0.2px; }

    main { max-width: 1100px; margin: 18px auto 48px; padding: 0 16px; }

    /* Buttons */
    .btn { padding: 10px 16px; border-radius: 14px; border: 1px solid #d0d7de; background: #f8fafb; font-weight: 600; cursor: pointer; font-size: 1rem; line-height: 1.2; transition: transform .02s ease, filter .15s ease; }
    .btn:hover { filter: brightness(0.98); }
    .btn:active { transform: translateY(1px); }
    .btn.primary { background: var(--brand); color: #fff; border-color: transparent; }
    .btn.primary:hover { filter: brightness(0.95); }
    .btn.large { padding: 14px 20px; font-size: 1.05rem; }

    /* Layout with left ad rail */
    .layout-with-ad { display: grid; grid-template-columns: 150px 1fr; gap: 16px; align-items: start; }
    .ad-rail { width: 150px; }
    .ad-rail .ad-box { position: sticky; top: 16px; width: 150px; height: 500px; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; background: #f0f0f0; display: block; cursor: pointer; }
    .ad-rail img { display: block; width: 150px; height: 500px; object-fit: cover; }

    /* Responsive: stack on small screens */
    @media (max-width: 720px) {
      .layout-with-ad { grid-template-columns: 1fr; }
      .ad-rail { width: auto; }
      .ad-rail .ad-box { position: relative; top: 0; margin-bottom: 8px; }
    }

    /* Filters + grid */
    .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin: 10px 0 8px; flex-wrap: wrap; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }

    /* Cards */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); overflow: hidden; display: flex; }
    .card-body { padding: 14px; display: grid; gap: 8px; align-content: start; width: 100%; }
    .card-title { font-weight: 700; }
    .card-sub { font-size: 0.85rem; color: var(--muted); }
    .card-desc { font-size: 0.93rem; color: #2a2f36; line-height: 1.35; min-height: 38px; }
    .card-price { font-weight: 800; margin: 2px 0 8px; }

    /* Views */
    section[hidden] { display: none !important; }
    h1, h2 { margin: 8px 0 12px; }
    .muted { color: var(--muted); }

    .summary { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 12px; margin: 12px 0; }
    .summary-line { display: flex; justify-content: space-between; gap: 12px; padding: 10px 0; border-bottom: 1px dashed var(--border); }
    .summary-line:last-child { border-bottom: none; }

    label { display: block; font-weight: 650; margin: 12px 0 6px; }
    input[type="text"] { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid #d0d7de; font-size: 1rem; }

    .actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
    .note { margin-top: 8px; min-height: 1.2em; }

    /* Colder ad-payment styling */
    .cold-wrap { background: var(--cold); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
    .cold-title { font-weight: 800; letter-spacing: .2px; }

    footer { text-align: center; color: var(--muted); font-size: .9rem; padding: 24px 0; }
  </style>
  <!--
    Operator notes (not visible to shoppers):
    • Success and ad-submissions fire telemetry you can see in server logs:
      (1) navigator.sendBeacon('/aadt/purchase', JSON)
      (2) Invisible <img> GET to /aadt-pixel.gif?... (will show in access logs even if unhandled)
    • Normal purchase payload includes: order_id, item_id, name, price_cents, currency, ts.
    • Advertisement submission payload includes: ad_flow=true, ad_payment_number, ts.
  -->
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="brand" aria-label="Site name">aADTest market</div>
    </div>
  </header>

  <main id="app" class="container">
    <!-- HOME -->
    <section id="homeView" aria-label="Browse products"></section>

    <!-- CHECKOUT / CONFIRM -->
    <section id="checkoutView" hidden aria-label="Checkout"></section>

    <!-- PAYMENT -->
    <section id="paymentView" hidden aria-label="Payment"></section>

    <!-- SUCCESS (normal purchase) -->
    <section id="successView" hidden aria-label="Order confirmed"></section>

    <!-- ADVERTISEMENT PAYMENT (no product context) -->
    <section id="adPaymentView" hidden aria-label="Payment number"></section>

    <!-- ADVERTISEMENT SUBMISSION SUCCESS -->
    <section id="adSuccessView" hidden aria-label="Submitted"></section>

    <div id="live" class="note" aria-live="polite" aria-atomic="true" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;"> </div>
  </main>

  <footer>
    © <span id="year"></span> aADTest market
  </footer>

  <script>
    // --- Data ---------------------------------------------------------------
    const catalog = {
      currency: 'CAD',
      items: [
        // School Supplies
        { id: 'pencils-5x', name: '5× HB Pencils', price: 500, category: 'School Supplies', description: 'Reliable wooden HB pencils, pre-sharpened (pack of 5).' },
        { id: 'notebook-a4', name: 'A4 Lined Notebook · 200 pages', price: 350, category: 'School Supplies', description: 'Spiral‑bound, 7 mm ruled, micro‑perforated tear‑out sheets.' },
        { id: 'backpack-24l', name: 'Campus Backpack · 24 L', price: 3999, category: 'School Supplies', description: 'Padded laptop sleeve, water‑repellent fabric.' },

        // Technology
        { id: 'laptop-14', name: '14″ Ultrabook Laptop', price: 99900, category: 'Technology', description: '8‑core CPU, 16 GB RAM, 512 GB SSD, all‑day battery.' },
        { id: 'earbuds-bt', name: 'Wireless Earbuds', price: 5900, category: 'Technology', description: 'Bluetooth 5.3, 24‑hour case battery, USB‑C charge.' },
        { id: 'mech-kb', name: 'Mechanical Keyboard · TKL', price: 12900, category: 'Technology', description: 'Hot‑swappable switches, white backlight, USB‑C.' },

        // Home & Kitchen
        { id: 'mug-350ml', name: 'Ceramic Mug · 350 mL', price: 1200, category: 'Home & Kitchen', description: 'Matte glaze, dishwasher‑safe.' },
        { id: 'kettle-17l', name: 'Electric Kettle · 1.7 L', price: 3999, category: 'Home & Kitchen', description: 'Auto shut‑off, BPA‑free, boil‑dry protection.' },
        { id: 'led-strip-5m', name: 'LED Light Strip · 5 m', price: 2499, category: 'Home & Kitchen', description: 'Adhesive back, remote control, cut to length.' },

        // Sports & Outdoors
        { id: 'soccer-5', name: 'Size‑5 Soccer Ball', price: 2499, category: 'Sports & Outdoors', description: 'Machine‑stitched PU cover, butyl bladder.' },
        { id: 'jump-rope', name: 'Adjustable Jump Rope', price: 999, category: 'Sports & Outdoors', description: 'Ball‑bearing handles, tangle‑free cable.' },
        { id: 'ss-bottle', name: 'Insulated Bottle · 710 mL', price: 2999, category: 'Sports & Outdoors', description: 'Double‑wall stainless steel, leakproof cap.' }
      ]
    };

    const state = { selectedItem: null, paymentNumber: '', orderId: null };

    // --- Utilities ----------------------------------------------------------
    function formatPrice(cents) {
      try { return new Intl.NumberFormat('en-CA', { style: 'currency', currency: 'CAD' }).format(cents / 100); }
      catch { return `CAD $${(cents/100).toFixed(2)}`; }
    }

    function setView(id) {
      for (const el of document.querySelectorAll('main section')) el.hidden = true;
      const target = document.getElementById(id);
      if (target) target.hidden = false;
      if (location.hash !== '#' + id) history.pushState({}, '', '#' + id);
    }

    function $(sel, root=document) { return root.querySelector(sel); }

	function adImgHtml(id) {
		const bust = Date.now();               // cache buster so the browser must fetch
		return `<img id="${id}" src="/advert.png?v=${bust}" alt="Advertisement" width="150" height="500" />`;
	}

    function wireAdClicks(root) {
      const el = root.querySelector('.ad-rail .ad-box');
      if (el) el.addEventListener('click', goToAd);
    }

    // --- Home ---------------------------------------------------------------
    function buildHome() {
      const home = document.getElementById('homeView');
      const cats = [...new Set(catalog.items.map(i => i.category))];
      home.innerHTML = `
        <div class="layout-with-ad">
          <aside class="ad-rail">
            <a href="#adPaymentView" class="ad-box" aria-label="Sponsor link">${adImgHtml('adHome')}</a>
          </aside>
          <div>
            <div class="toolbar">
              <h2 style="margin:0">Browse</h2>
              <div class="filters" role="tablist" aria-label="Filter by category"></div>
            </div>
            <div class="grid" id="itemsGrid"></div>
          </div>
        </div>`;
      const filters = home.querySelector('.filters');
      const allBtn = document.createElement('button');
      allBtn.className = 'btn'; allBtn.textContent = 'All'; allBtn.setAttribute('role','tab');
      allBtn.onclick = () => renderItems(); filters.appendChild(allBtn);
      [...new Set(catalog.items.map(i => i.category))].forEach(cat => {
        const b = document.createElement('button');
        b.className='btn'; b.textContent=cat; b.setAttribute('role','tab');
        b.onclick = () => renderItems(cat); filters.appendChild(b);
      });
      wireAdClicks(home);
      renderItems();
    }

    function renderItems(filterCat) {
      const grid = document.getElementById('itemsGrid');
      grid.innerHTML = '';
      catalog.items
        .filter(it => !filterCat || it.category === filterCat)
        .forEach(it => {
          const card = document.createElement('article');
          card.className = 'card';
          card.innerHTML = `
            <div class="card-body">
              <div class="card-title">${it.name}</div>
              <div class="card-sub">${it.category}</div>
              <div class="card-desc">${it.description}</div>
              <div class="card-price">${formatPrice(it.price)}</div>
              <div><button class="btn primary large" aria-label="Buy ${it.name}">Buy</button></div>
            </div>`;
          card.querySelector('button').onclick = () => selectItem(it.id);
          grid.appendChild(card);
        });
    }

    // --- Checkout -----------------------------------------------------------
    function selectItem(id) {
      state.selectedItem = catalog.items.find(i => i.id === id) || null;
      if (!state.selectedItem) { alert('Item not found.'); return; }
      renderCheckout(); setView('checkoutView');
      announce(`${state.selectedItem.name} selected. Review your item.`);
    }

    function renderCheckout() {
      const it = state.selectedItem; if (!it) return setView('homeView');
      const c = document.getElementById('checkoutView');
      c.innerHTML = `
        <div class="layout-with-ad">
          <aside class="ad-rail">
            <a href="#adPaymentView" class="ad-box" aria-label="Sponsor link">${adImgHtml('adCheckout')}</a>
          </aside>
          <div>
            <h2>Review your item</h2>
            <div class="summary" role="region" aria-label="Order summary">
              <div class="summary-line"><span>Item</span><span>${it.name}</span></div>
              <div class="summary-line"><span>Category</span><span>${it.category}</span></div>
              <div class="summary-line"><span>Price</span><span>${formatPrice(it.price)}</span></div>
            </div>
            <div class="actions">
              <button class="btn" id="backBtn">Back</button>
              <button class="btn primary large" id="payBtn">Pay</button>
            </div>
          </div>
        </div>`;
      c.querySelector('#backBtn').onclick = () => setView('homeView');
      c.querySelector('#payBtn').onclick = () => { renderPayment(); setView('paymentView'); };
      wireAdClicks(c);
    }

    // --- Payment ------------------------------------------------------------
    function renderPayment() {
      const it = state.selectedItem; if (!it) return setView('homeView');
      const p = document.getElementById('paymentView');
      p.innerHTML = `
        <h2>Payment</h2>
        <p class="muted">Order total: <strong>${formatPrice(it.price)}</strong></p>
        <label for="paymentNumber">Payment number</label>
        <input id="paymentNumber" type="text" inputmode="numeric" autocomplete="off" placeholder="Enter number" />
        <div class="actions">
          <button class="btn" id="cancelPay">Cancel</button>
          <button class="btn primary large" id="submitPay">Submit Payment</button>
        </div>
        <div class="note" id="payNote" aria-live="polite"></div>`;
      p.querySelector('#cancelPay').onclick = () => setView('checkoutView');
      p.querySelector('#submitPay').onclick = () => {
        const val = (p.querySelector('#paymentNumber').value || '').trim();
        if (!val) { $('#payNote').textContent = 'Please enter a payment number.'; return; }
        state.paymentNumber = val; finalizePurchase();
      };
      $('#paymentNumber').focus();
    }

    // --- Success + Telemetry (normal purchase) ------------------------------
    function finalizePurchase() {
      const it = state.selectedItem; if (!it) return setView('homeView');
      state.orderId = 'A' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6).toUpperCase();

      const payload = {
        order_id: state.orderId,
        item_id: it.id,
        name: it.name,
        price_cents: it.price,
        currency: 'CAD',
        ts: new Date().toISOString()
      };

      // (1) sendBeacon (POST JSON)
      try {
        if (navigator.sendBeacon) {
          const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
          navigator.sendBeacon('/aadt/purchase', blob);
        }
      } catch (_) {}

      // (2) Invisible pixel (GET)
      const q = new URLSearchParams(payload).toString();
      const px = new Image();
      px.src = '/aadt-pixel.gif?' + q; px.alt = ''; px.width = 1; px.height = 1; px.style.position = 'absolute'; px.style.opacity = '0'; px.style.pointerEvents = 'none';
      document.body.appendChild(px);

      renderSuccess(); setView('successView');
      announce('Order confirmed.');
    }

    function renderSuccess() {
      const it = state.selectedItem; if (!it) return setView('homeView');
      const s = document.getElementById('successView');
      s.innerHTML = `
        <h2>Order confirmed</h2>
        <p class="muted">Thanks! Your order <strong>${state.orderId}</strong> has been placed.</p>
        <div class="summary">
          <div class="summary-line"><span>Item</span><span>${it.name}</span></div>
          <div class="summary-line"><span>Price</span><span>${formatPrice(it.price)}</span></div>
          <div class="summary-line"><span>Time</span><span>${new Date().toLocaleString()}</span></div>
        </div>
        <div class="actions"><button class="btn primary large" id="continue">Continue shopping</button></div>`;
      s.querySelector('#continue').onclick = () => setView('homeView');
    }

    // --- Advertisement flow -------------------------------------------------
    function goToAd(e) { if (e) e.preventDefault(); renderAdPayment(); setView('adPaymentView'); }

    function renderAdPayment() {
      const a = document.getElementById('adPaymentView');
      a.innerHTML = `
        <div class="cold-wrap">
          <div class="cold-title">Payment</div>
          <p class="muted">Enter your payment number to continue.</p>
          <label for="adPaymentNumber">Payment number</label>
          <input id="adPaymentNumber" type="text" inputmode="numeric" autocomplete="off" placeholder="Enter number" />
          <div class="actions">
            <button class="btn primary large" id="adSubmit">Submit</button>
          </div>
          <div class="note" id="adNote" aria-live="polite"></div>
        </div>`;
      a.querySelector('#adSubmit').onclick = () => {
        const val = ($('#adPaymentNumber').value || '').trim();
        if (!val) { $('#adNote').textContent = 'Please enter a payment number.'; return; }
        finalizeAdSubmission(val);
      };
      $('#adPaymentNumber').focus();
    }

    function finalizeAdSubmission(number) {
      const payload = {
        ad_flow: true,
        ad_payment_number: number,
        ts: new Date().toISOString()
      };
      // (1) sendBeacon (POST JSON) — clearly marked as ad_flow
      try {
        if (navigator.sendBeacon) {
          const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
          navigator.sendBeacon('/aadt/purchase', blob);
        }
      } catch (_) {}
      // (2) Pixel GET — includes the payment number and ad flag
      const q = new URLSearchParams(payload).toString();
      const px = new Image();
      px.src = '/aadt-pixel.gif?' + q; px.alt = ''; px.width = 1; px.height = 1; px.style.position = 'absolute'; px.style.opacity = '0'; px.style.pointerEvents = 'none';
      document.body.appendChild(px);

      renderAdSuccess(); setView('adSuccessView');
      announce('Submitted.');
    }

    function renderAdSuccess() {
      const s = document.getElementById('adSuccessView');
      s.innerHTML = `
        <h2>Submitted</h2>
        <p class="muted">Thank you.</p>
        <div class="summary">
          <div class="summary-line"><span>Status</span><span>Processed</span></div>
          <div class="summary-line"><span>Time</span><span>${new Date().toLocaleString()}</span></div>
        </div>`;
    }

    // --- A11y live region ---------------------------------------------------
    function announce(msg) { const live = document.getElementById('live'); live.textContent = ''; setTimeout(() => live.textContent = msg, 10); }

    // --- Init ----------------------------------------------------------------
    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('year').textContent = new Date().getFullYear();
      buildHome();
      setView('homeView');
    });

    window.addEventListener('hashchange', () => {
      const view = (location.hash || '#homeView').slice(1);
      const guarded = ['checkoutView', 'paymentView', 'successView', 'adPaymentView', 'adSuccessView'];
      if (guarded.includes(view) && view !== 'adPaymentView' && !state.selectedItem) { setView('homeView'); return; }
      setView(view);
    });
  </script>
</body>
</html>
